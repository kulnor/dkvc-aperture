name: aperture

services:
  db:
    build: ./docker/postgres
    image: aperture-postgres:dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aperture
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aperture"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
